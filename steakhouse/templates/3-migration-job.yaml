apiVersion: batch/v1
kind: Job
metadata:
  name: django-db-migrate-{{ .Release.Revision }} # Ensures a new job runs on each helm upgrade
  namespace: {{ .Values.namespace }}
spec:
  template:
    spec:
      containers:
      - name: migrate
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["python", "manage.py", "migrate"]
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
      restartPolicy: OnFailure
